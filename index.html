<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStudio Editor</title>

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Monaco Loader -->
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <button onclick="shareProject()">🔗 Share</button>
        <button onclick="downloadProject()">⬇ Download</button>
        <button onclick="run()">▶ Run</button>
        <button onclick="clearConsole()">🧹 Console</button>
    </div>

    <!-- MAIN -->
    <div class="container">

        <!-- LEFT PANEL -->
        <div class="left">

            <!-- TABS -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('html')">HTML</div>
                <div class="tab" onclick="switchTab('css')">CSS</div>
                <div class="tab" onclick="switchTab('js')">JS</div>
            </div>

            <!-- MONACO EDITOR -->
            <div id="editor" class="editor"></div>

        </div>

        <!-- RESIZER -->
        <div class="resizer" id="resizer"></div>

        <!-- RIGHT PANEL -->
        <div class="right">

            <!-- OUTPUT -->
            <iframe id="output" sandbox="allow-scripts"></iframe>

            <!-- CONSOLE -->
            <div class="console">
                <h3>Console</h3>
                <div id="console"></div>
            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- JS -->
    <script src="index.js"></script>

</body>
</html>
